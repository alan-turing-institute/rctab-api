---

name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  # FastAPI session secret.
  SESSION_SECRET: some_secret

# Least-privilege default; the test job overrides with the scopes it needs.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # For python-coverage-comment-action: PR comment + push to data branch.
    permissions:
      contents: write
      pull-requests: write

    strategy:
      matrix:
        python_version: ['3.11']

    services:
      redis:
        image: redis
        ports:
          # Opens tcp port 6379 on the host and service container
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install poetry
        uses: abatilo/actions-poetry@v3

      - name: Install dependencies
        run: poetry install --all-extras

      - name: Run main tests
        shell: bash
        run: |
          export CELERY_RESULT_BACKEND="redis://localhost:6379/0"
          scripts/runtests.sh -c main -s

      - name: Run route tests
        shell: bash
        run: |
          scripts/runtests.sh -c routes -s

      # Combined main + routes coverage is complete here.
      - name: Publish coverage comment and badge
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check DB downgrade
        shell: bash
        run: |
          scripts/runtests.sh -c migrations -s

  docs_build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python_version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install poetry
        uses: abatilo/actions-poetry@v3

      - name: Install dependencies
        run: poetry install --all-extras

      - name: Build HTML docs
        shell: bash
        run: poetry run make html
        working-directory: docs

  docker_build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check that we can build docker container image
        run: docker build .
